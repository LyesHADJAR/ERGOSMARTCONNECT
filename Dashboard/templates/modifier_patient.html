{% load static %}
<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Patient | SmartWrist Rehab</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root{
            --bg:#f3f7f5;
            --text:#0f172a;
            --muted:#475569;
            --primary:#2E8B57;
            --primary2:#1f6a43;
            --border: rgba(0,0,0,.12);
        }

        body{
            min-height:100vh;
            margin:0;
            background: 
                radial-gradient(900px 420px at 10% 10%, rgba(46,139,87,.14), transparent 62%),
                radial-gradient(850px 420px at 88% 12%, rgba(21,82,52,.10), transparent 58%),
                linear-gradient(135deg, #f8fafc 0%, #eef7f1 52%, #f8fafc 100%);
            font-family: system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
            color:var(--text);
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .edit-wrap {
            width: 100%;
            max-width: 600px;
            animation: fadeIn 0.8s ease-out both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .edit-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(15, 23, 42, 0.10);
            border-radius: 24px;
            box-shadow: 0 24px 56px rgba(15, 23, 42, 0.13);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .edit-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, rgba(46, 139, 87, 0.22), rgba(255, 255, 255, 0.1), rgba(21, 82, 52, 0.18));
            border-radius: 30px;
            z-index: -1;
        }

        .title {
            font-weight: 900;
            text-align: center;
            margin-bottom: 24px;
            font-size: 1.8rem;
            color: #0f172a;
        }

        .form-label {
            font-weight: 700;
            color: #111827;
            font-size: 0.95rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
            display: inline-block;
        }

        .field {
            border: 2px solid rgba(46, 139, 87, 0.28);
            border-radius: 12px;
            padding: 12px 16px;
            font-weight: 600;
            color: #111827;
            background: rgba(255, 255, 255, 0.95);
            transition: all 0.3s ease;
        }

        .field:focus {
            box-shadow: 0 0 0 4px rgba(46, 139, 87, 0.15);
            border-color: var(--primary);
            background: white;
            outline: none;
        }

        .btn-main {
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(46, 139, 87, 0.25);
            color: white;
        }

        .btn-secondary-custom {
            background: #fff;
            color: #475569;
            border: 2px solid #e2e8f0;
            padding: 12px 24px;
            font-weight: 700;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .btn-secondary-custom:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="edit-wrap">
        <div class="edit-card">
            <h1 class="title">✏️ Modifier le patient</h1>
            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label">Nom</label>
                    <input type="text" name="nom" class="form-control field" value="{{ user.nom }}" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Prénom</label>
                    <input type="text" name="prenom" class="form-control field" value="{{ user.prenom }}" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control field" value="{{ user.email }}" required>
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Téléphone</label>
                    <input type="tel" name="telephone" class="form-control field" value="{{ patient.telephone }}">
                </div>
                
                <div class="mb-4">
                    <label class="form-label">Date de naissance</label>
                    <input type="date" name="date_naissance" class="form-control field" value="{{ patient.date_naissance|date:'Y-m-d' }}">
                </div>
                
                <div class="d-flex justify-content-between mt-5">
                    <a href="{% url 'patients' %}" class="btn btn-secondary-custom">Annuler</a>
                    <button type="submit" class="btn btn-main">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
